<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Logout</title>

<link href="./output-style.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<!-- LOGOUT CONFIRMATION CARD -->
<div class="bg-white shadow-lg rounded-xl p-8 w-96 text-center">

<h2 class="text-xl font-bold mb-4">Confirm Logout</h2>

<p class="text-gray-500 mb-6">
Are you sure you want to logout?
</p>

<div class="flex justify-center gap-4">

<!-- YES BUTTON -->
<button id="confirmLogout"
class="bg-gray-300 px-6 py-2 rounded hover:bg-red-600 transition">
Yes
</button>

<!-- NO BUTTON -->
<button id="cancelLogout"
class="bg-gray-300 px-6 py-2 rounded hover:bg-gray-400 transition">
No
</button>

</div>

</div>
<script src="./logoutscript.js"></script>
</body>
</html>
