<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro-Bridge signup</title>
    <link rel="stylesheet" href="./output-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{
            font-family:'Inter', sans-serif;
        }

        /* LOADING OVERLAY */
#loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
display:none;
}

/* SPINNER */
.spinner{
border:6px solid #f3f3f3;
border-top:6px solid #22c55e;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{ transform:rotate(0deg); }
100%{ transform:rotate(360deg); }
}

    </style>
</head>

<body class="bg-gray-100">

     <!-- loading spinner -->
  <div id="loadingOverlay">
<div class="flex flex-col items-center gap-4 text-white">

<div class="spinner"></div>

<p class="text-lg font-semibold">Creating your account...</p>

</div>
</div>

    <div class="min-h-screen flex">

<!-- LEFT IMAGE SIDE -->
<div class="hidden lg:flex w-1/2 relative">

<img src="https://images.unsplash.com/photo-1542838132-92c53300491e"
class="absolute inset-0 w-full h-full object-cover">

<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70"></div>

<div class="relative z-10 flex flex-col justify-between p-12 text-white w-full">

<!-- logo -->
<div class="flex items-center gap-3">
<div class="bg-green-500 w-11 h-11 rounded-xl flex items-center justify-center text-white text-xl">
<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M440-120v-319q-64 0-123-24.5T213-533q-45-45-69-104t-24-123v-80h80q63 0 122 24.5T426-746q31 31 51.5 68t31.5 79q5-7 11-13.5t13-13.5q45-45 104-69.5T760-720h80v80q0 64-24.5 123T746-413q-45 45-103.5 69T520-320v200h-80Zm0-400q0-48-18.5-91.5T369-689q-34-34-77.5-52.5T200-760q0 48 18 92t52 78q34 34 78 52t92 18Zm80 120q48 0 91.5-18t77.5-52q34-34 52.5-78t18.5-92q-48 0-92 18.5T590-569q-34 34-52 77.5T520-400Zm0 0Zm-80-120Z"/></svg>
</div>
<span class="text-xl font-semibold">Agro-Bridge</span>
</div>

<!-- text -->
<div>
<h1 class="text-5xl font-extrabold leading-tight mb-6">
Connecting the roots<br>
to your table.
</h1>

<p class="text-gray-200 text-lg max-w-md">
Join thousands of farmers and buyers in a marketplace built on trust and fresh quality.
</p>
</div>

</div>
</div>


<!-- RIGHT FORM SIDE -->
<div class="flex w-full lg:w-1/2 items-center justify-center">

<div class="w-full max-w-lg px-10 py-12">

<h2 class="text-3xl font-bold text-gray-900">Create Account</h2>
<p class="text-gray-500 mt-2 mb-8">
Start your journey with Agro-Bridge today.
</p>

<!-- ROLE SELECT -->
<div class="flex rounded-xl bg-green-50 p-1 mb-6">

<button id="buyerBtn"
class="flex-1 py-3 rounded-lg bg-white border-2 border-green-300 font-medium flex items-center justify-center gap-2 shadow-sm">
🛒 I am a Buyer
</button>

<button id="farmerBtn"
class="flex-1 py-3 rounded-lg text-gray-600  flex items-center justify-center gap-2">
🚜 I am a Farmer
</button>

</div>


<form  id="signupForm" class="space-y-5">

<!-- NAME -->
<div>
<label class="text-sm text-gray-600">name</label>
<div class="relative mt-1">
<span class="absolute left-3 top-3 text-gray-400">👤</span>

<input type="text"
id="name"
placeholder="John Doe"
class="w-full pl-10 pr-3 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
</div>
</div>


<!-- EMAIL -->
<div>
<label class="text-sm text-gray-600">email</label>
<div class="relative mt-1">
<span class="absolute left-3 top-3 text-gray-400">✉</span>

<input type="text"
id="email"
placeholder="john@example.com"
class="w-full pl-10 pr-3 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
</div>
</div>


<!-- PHONE -->
<div>
<label class="text-sm text-gray-600">phone</label>

<div class="flex mt-1">

<div class="px-1 flex items-center gap-2 whitespace-nowrap leading-none border rounded-l-lg bg-gray-50 text-gray-500">
     📞 <span>+123</span>
</div>

<input type="tel"
id="phone"
placeholder="123-456-7890"
class="w-full border-t border-b border-r rounded-r-lg px-3 py-3 focus:ring-2 focus:ring-green-500 outline-none">
</div>
</div>


<!-- PASSWORD -->
<div>
<label class="text-sm text-gray-600">password</label>

<div class="relative mt-1">

<span class="absolute left-3 top-3 text-gray-400">🔒</span>

<input id="password"
type="password"
placeholder="••••••••"
class="w-full pl-10 pr-10 py-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">

<span id="togglePass"
class="absolute right-3 top-3 cursor-pointer text-gray-400 text-lg">
<i class="fa-regular fa-eye-slash"></i>
</span>

</div>
</div>


<!-- TERMS -->
<label class="flex items-start gap-2 text-sm text-gray-600">
<input type="checkbox" class="mt-1 accent-orange-500">

<span>
By creating an account, I agree to Agro-Bridge's
<a href="#" class="text-green-500 font-medium">Terms of Service</a>
and
<a href="#" class="text-green-500 font-medium">Privacy Policy</a>.
</span>
</label>


<!-- BUTTON -->
<button
type="submit"
class="w-full bg-green-500 hover:bg-gray-600 transition text-white py-4 rounded-xl font-semibold shadow-lg">
Create Account →
</button>

</form>


<!-- LOGIN LINK -->
<p class="text-center text-gray-500 mt-8">
Already have an account?
<a href="login.html" class="text-green-500 font-semibold">Sign In</a>
</p>


<!-- dots -->
<div class="flex justify-center gap-3 mt-6">
<div class="w-3 h-3 rounded-full bg-gray-300"></div>
<div class="w-3 h-3 rounded-full bg-gray-400"></div>
</div>

</div>
</div>

</div>

  <script src="./signupscript.js"></script>
    
</body>
</html>
